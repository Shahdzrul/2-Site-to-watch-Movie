<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
}

.top{
padding:10px;
background:#111;
}

button{
margin-right:10px;
}

iframe{
width:100%;
height:calc(100% - 60px);
border:none;
}
</style>
</head>

<body>

<div class="top">
<button onclick="changeSite('https://hurawatch.cx/home')">
Hurawatch
</button>

<button onclick="changeSite('https://7reels.cc/')">
7Reels
</button>
</div>

<iframe id="viewer"></iframe>

<script>
function changeSite(url){
document.getElementById("viewer").src=url;
}

changeSite("https://hurawatch.cx/home");
</script>

</body>
</html>
